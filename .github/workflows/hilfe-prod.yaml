name: Deploy A.eins Hilfe (Production)

# Production-Build: läuft NUR bei Push eines Versions-Tags im A.eins-Format N.N.N.N (z.B. 9.0.2502.9).
# Der Tag ist die Version und kennzeichnet das Docker-Image. Gilt nur für hilfe.
# (Bei Tag-Pushes ignoriert GitHub 'paths' — ein Versions-Tag ist ein bewusster Release.)
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

defaults:
  run:
    working-directory: hilfe

jobs:
  build:
    runs-on: a1hilfe
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # Prod nur, wenn der getaggte Commit in 'main' enthalten ist (Tags sind branch-
      # unabhängig; GitHub kann das nicht am Trigger filtern -> Guard hier, fail-fast).
      - name: Tag muss auf main liegen
        working-directory: .
        run: |
          git fetch --no-tags --quiet origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "OK: Tag-Commit ist in main enthalten."
          else
            echo "::error::Tag $GITHUB_REF_NAME liegt nicht auf main — Abbruch."
            exit 1
          fi
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Add mdbook and extensions to path
        run: echo "/opt/cargo/bin" >> $GITHUB_PATH
      - name: Prepare correct book.toml for build
        run: mv book.prod.toml book.toml
      - name: Run tests
        run: mdbook test
      - name: Build Hilfe
        run: mdbook build
      # Chrome/Chromium printToPdf ist der limitierende Faktor -> gechunkte PDF-Pipeline
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: v24
      - name: Custom PDF generation!
        run: |
          cd pdf_pipeline
          npm i
          npm run build
      - name: Get short commit SHA and store it
        run: echo "CID=$(git log -1 --format=%h)" >> $GITHUB_ENV
      - name: Rename PDF file
        run: |
          cp book/pdf/output.pdf book/pdf/Aeins-$CID.pdf
          mv book/pdf/output.pdf book/pdf/Aeins.pdf
      - name: Copy PDF to LFB
        run: sshpass -p '${{ secrets.SCP_PW }}' scp book/pdf/Aeins-$CID.pdf '${{ secrets.SCP_USER }}@${{ vars.SCP_HOST }}:${{ vars.SCP_DIR }}'
      - name: Handle old container
        run: |
          chmod +x ../handle-old-container.sh
          ../handle-old-container.sh hilfe
      # Image wird ausschließlich mit der Version (= Tag-Name) getaggt, kein :latest
      - name: Build Docker image
        run: docker build -t hilfe:${{ github.ref_name }} .
      - name: Deploy internal Onlinehilfe
        run: >
          docker run -d
          --restart always
          --name hilfe
          --network infra
          -p 8180:80
          hilfe:${{ github.ref_name }}
