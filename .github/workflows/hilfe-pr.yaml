name: PR Check A.eins Hilfe

# Validiert PRs gegen 'dev': baut + testet nur, KEIN Deploy/PDF/SCP.
# Fängt "baut nicht durch" (kaputte Links/Markdown, fehlende Ziele) vor dem Merge ab.
on:
  pull_request:
    branches: [dev]

defaults:
  run:
    working-directory: hilfe

jobs:
  build:
    name: Build A.eins Hilfe (PR)
    runs-on: spike-a1hilfe-mdbook
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Add mdbook and extensions to path
        run: echo "/opt/cargo/bin" >> $GITHUB_PATH
      - name: Run tests
        run: mdbook test
      - name: Build Hilfe
        run: mdbook build
