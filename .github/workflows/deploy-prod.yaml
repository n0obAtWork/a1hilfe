name: Deploy A.eins Hilfe

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.gitignre'
      - '.prettierignore'

  workflow_dispatch:

jobs:
  build:
    runs-on: spike-a1hilfe-mdbook
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Add mdbook and extensions to path
        run: echo "/opt/cargo/bin" >> $GITHUB_PATH
      - name: Prepare correct book.toml for build
        run: mv book.orig.toml book.toml
      - name: Run tests
        run: mdbook test
      - name: Build Hilfe
        run: mdbook build
      - name: Rename PDF file
        run: mv book/pdf/output.pdf book/pdf/Aeins.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: pdf
          path: book/pdf/Aeins.pdf
      - name: Handle old container
        run: |
          chmod +x ./handle-old-container.sh
          ./handle-old-container.sh spike-a1hilfe-mdbook      
      - name: Build Docker image
        run: docker build -t spike-a1hilfe-mdbook:latest .
      - name: Deploy Onlinehilfe
        run: >
          docker run -d
          --restart always
          --name spike-a1hilfe-mdbook
          --network dev
          -p 8181:80
          spike-a1hilfe-mdbook:latest
        