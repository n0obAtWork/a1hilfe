name: Deploy A.eins Hilfe

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  build:
    runs-on: Linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      #- run: |
      #    rustc --version
      #    cargo --help
      #- name: Setup Chrome
      #  uses: browser-actions/setup-chrome@v2
      - name: Add mdbook to path
        run: "/opt/cargo/bin" >> $GITHUB_PATH
      - name: Run tests
        run: mdbook test
      - name: Build Hilfe
        run: mdbook build
